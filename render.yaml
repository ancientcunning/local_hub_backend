services:
  - type: web
    name: localhub-backend
    runtime: python
    plan: free
    rootDir: backend_
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TOURAPI_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
